# TethysDash portal config for the workshop.
#
# Customizations vs. the stock tethys gen portal_config output:
#   * AGENTS block          - packages + models (with per-model host) + runner mode
#   * SQLite persistent store under /home/tethys/persist (no Postgres needed)

# yamllint disable rule:line-length

version: 1.0

apps:
  tethysdash:
    # NOTE on persistent store wiring (PersistentStoreDatabaseSetting "primary_db"):
    # Tethys's portal_config loader does NOT auto-create services from an
    # `apps.<app>.PERSISTENT_STORES: {<setting_name>: {URL, SPATIAL}}` block -
    # that shape is silently ignored. The runtime requires an actual
    # PersistentStoreService row PLUS an explicit setting->service link, both
    # of which are CLI-only. scripts/init.sh runs these on first container
    # start (idempotent):
    #     tethys services create persistent -n tethysdash_primary -t sqlite -d $TETHYS_PERSIST
    #     tethys link persistent:tethysdash_primary tethysdash:ps_database:primary_db
    #
    # AGENTS lives at the TOP-LEVEL `settings:` block below, NOT here. The
    # consumers (cli.py / controllers.py) read it via `from django.conf
    # import settings; settings.AGENTS`, which only sees the top-level
    # block. An `apps.tethysdash.SETTINGS.AGENTS` block goes into the
    # app's CustomSetting bucket (`app.get_custom_setting(...)`) and is
    # invisible to django.conf.settings.

settings:
  SECRETS:
    SECRET_KEY: tethys-agents-workshop-dev-only-NOT-FOR-PROD
  STATIC_ROOT: /home/tethys/persist/static
  MEDIA_ROOT: /home/tethys/persist/media
  TETHYS_WORKSPACES_ROOT: /home/tethys/persist/workspaces

  # Single source of truth for the chat agents. Read by the chat controller
  # (controllers.py) and the `tethysdash chat` CLI (cli.py) via
  # `from django.conf import settings; settings.AGENTS`.
  #
  # PACKAGES - Python packages the discovery layers walk. A package may
  #   contribute tools (<pkg>.tools), runners (<pkg>.agent), or both.
  #   Missing submodules are skipped silently, so it's safe to list a
  #   tools-only host package alongside a tools+runners plugin.
  #
  # MODELS  - list of {name, host} dicts. The first entry is the default;
  #   `tethysdash chat --model <name>` picks any other entry by name.
  #   Per-model host lets future entries point at different backends
  #   (e.g. one local ollama, one hosted inference endpoint) without a
  #   separate top-level OLLAMA_HOST setting. setup.sh pre-pulls the first
  #   model into ollama so the workshop's first prompt doesn't stall on a
  #   multi-GB download.
  #
  # MODE    - default runner name. Each plugin's RUNNERS dict (at
  #   <pkg>.agent) keys are the valid choices. The CLI's `--runner` flag
  #   overrides per-invocation. The geoglows-summit-example plugin exposes
  #   "single" and "multi".
  AGENTS:
    PACKAGES:
      - tethysapp.tethysdash
      - geoglows_summit_example
    MODELS:
      - name: qwen3:4b
        host: http://ollama:11434
    MODE: multi

  # DEBUG must be true: `tethys manage start` (Daphne/ASGI) has no static
  # middleware installed, so /static/* is only served by Django's
  # contrib.staticfiles auto-handler, which only runs when DEBUG=True. The
  # bundle filename mismatch (controller wants frontend/main.js, repo ships
  # main.<hash>.js) is resolved separately by init.sh symlinking main.js to
  # the hashed bundle.
  DEBUG: true
  ALLOWED_HOSTS:
    - "*"

  # SQLite for the platform-level DB too - keeps the workshop dependency-light
  # (no Postgres container needed). Production deployments swap this for PG.
  DATABASES:
    default:
      ENGINE: django.db.backends.sqlite3
      NAME: /home/tethys/persist/tethys_platform.sqlite

  CHANNEL_LAYERS:
    default:
      BACKEND: channels.layers.InMemoryChannelLayer
