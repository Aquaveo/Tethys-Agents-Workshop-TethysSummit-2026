# TethysDash portal config for the workshop.
#
# Customizations vs. the stock tethys gen portal_config output:
#   * AGENTS block          - packages + models (with per-model host) + runner mode
#   * SQLite persistent store under /home/tethys/persist (no Postgres needed)

# yamllint disable rule:line-length

version: 1.0

apps:
  tethysdash:
    PERSISTENT_STORES:
      primary_db:
        URL: sqlite:////home/tethys/persist/tethysdash_primary.sqlite
        SPATIAL: false
    SETTINGS:
      # Single source of truth for the chat agents.
      #
      # PACKAGES - Python packages the discovery layers walk. A package
      #   may contribute tools (<pkg>.tools), runners (<pkg>.agent), or
      #   both. Missing submodules are skipped silently, so it's safe to
      #   list a tools-only host package alongside a tools+runners plugin.
      #   Consumed by:
      #     - the chat controller        (controllers.py)
      #     - the tethysdash chat CLI    (cli.py - passes to runner)
      #
      # MODELS  - list of available LLM model entries. Each entry pairs a
      #   model `name:` with the `host:` URL of the backend serving it.
      #   The first entry is the default; the CLI's --model flag can pick
      #   any other name (entries with a matching name use that entry's
      #   host; unrecognized names fall back to the default entry's host).
      #   setup.sh pre-pulls the first model into ollama so the workshop's
      #   first prompt doesn't stall on a multi-GB download.
      #   Per-model host lets future entries point at different backends
      #   (e.g. one local ollama, one hosted inference endpoint) without a
      #   separate top-level OLLAMA_HOST setting.
      #
      # MODE    - default runner name. Each plugin's RUNNERS dict (at
      #   <pkg>.agent) keys are the valid choices. The CLI's --runner flag
      #   overrides per-invocation. The geoglows-summit-example plugin
      #   exposes "single" and "multi".
      AGENTS:
        PACKAGES:
          - tethysapp.tethysdash
          - geoglows_summit_example
        MODELS:
          - name: qwen3:8b
            host: http://ollama:11434
        MODE: multi

settings:
  SECRETS:
    SECRET_KEY: tethys-agents-workshop-dev-only-NOT-FOR-PROD
  STATIC_ROOT: /home/tethys/persist/static
  MEDIA_ROOT: /home/tethys/persist/media
  TETHYS_WORKSPACES_ROOT: /home/tethys/persist/workspaces

  DEBUG: true
  ALLOWED_HOSTS:
    - "*"

  # SQLite for the platform-level DB too - keeps the workshop dependency-light
  # (no Postgres container needed). Production deployments swap this for PG.
  DATABASES:
    default:
      ENGINE: django.db.backends.sqlite3
      NAME: /home/tethys/persist/tethys_platform.sqlite

  LOGGING:
    handlers:
      console:
        level: INFO

  CHANNEL_LAYERS:
    default:
      BACKEND: channels.layers.InMemoryChannelLayer
